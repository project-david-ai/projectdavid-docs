name: Lint, Build & Deploy projectdavid_docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  # ────────────────────────────────
  #  🧹 Lint Dockerfile
  # ────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 🕺 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Lint Dockerfile (hadolint)
        run: |
          sudo wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          hadolint Dockerfile || true

  # ────────────────────────────────
  #  🧪 Validate docker-compose.prod.yml
  # ────────────────────────────────
  compose-check:
    name: 🧪 Docker Compose Sanity Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 🕺 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Compose
        run: docker compose -f docker-compose.prod.yml build

  # ────────────────────────────────
  #  🚀 Build, Tag & Push
  # ────────────────────────────────
  deploy:
    name: 🚀 Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [lint, compose-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 🕺 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: thanosprime
          password: ${{ secrets.DOCKERHUB_THANOSPRIME }}

      - name: 🚀 semantic-release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Get version from latest tag
        id: version
        run: |
          git fetch --tags origin
          echo "VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - name: 📦 Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: thanosprime/projectdavid-docs
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: 🏗️ Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

  # ────────────────────────────────
  #  🌍 Deploy to AWS
  # ────────────────────────────────
  deploy-aws:
    name: 🌍 Deploy to AWS
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Pull & restart on AWS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_DEPLOY_KEY }}
          script: |
            docker pull thanosprime/projectdavid-docs:latest
            docker stop projectdavid-docs || true
            docker rm projectdavid-docs || true
            docker run -d \
              --name projectdavid-docs \
              -p 80:80 \
              -p 443:443 \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              --restart unless-stopped \
              thanosprime/projectdavid-docs:latest