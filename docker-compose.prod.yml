version: "3.8"

services:
  docs:
    # ─── Build context (required for CI compose-check) ─────
    build:
      context: .
      dockerfile: Dockerfile          # ← your multi-stage prod Dockerfile
    # ─── Runtime image tag ──────────
    image: thanosprime/projectdavid-docs:latest
    container_name: projectdavid_docs
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    # Optional future env vars:
    # environment:
    #   - NODE_ENV=production