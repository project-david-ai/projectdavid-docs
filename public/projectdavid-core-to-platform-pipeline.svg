<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2E75B6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="sg" x="-60%" y="-200%" width="220%" height="500%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="pg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <style>
      text { font-family: Arial, sans-serif; }
      .sk-g {
        fill: none; stroke: #3a8fd4; stroke-width: 5; stroke-linecap: round;
        stroke-dasharray: 90 9999; opacity: 0; filter: url(#sg);
        animation: spark 8s linear infinite; pointer-events: none;
      }
      .sk-c {
        fill: none; stroke: #9ecfff; stroke-width: 1.5; stroke-linecap: round;
        stroke-dasharray: 90 9999; opacity: 0;
        animation: spark 8s linear infinite; pointer-events: none;
      }
      @keyframes spark {
        0%   { stroke-dashoffset: 90;    opacity: 0; }
        4%   { opacity: 1; }
        74%  { stroke-dashoffset: -1220; opacity: 1; }
        78%  { stroke-dashoffset: -1220; opacity: 0; }
        100% { stroke-dashoffset: 90;    opacity: 0; }
      }
      .pu-g {
        fill: none; stroke: #B87800; stroke-width: 6; stroke-linecap: round;
        stroke-dasharray: 20 120; opacity: 0; filter: url(#pg);
        animation: pulse-up 5s linear infinite; pointer-events: none;
      }
      .pu-c {
        fill: none; stroke: #FFD060; stroke-width: 1.5; stroke-linecap: round;
        stroke-dasharray: 20 120; opacity: 0;
        animation: pulse-up 5s linear infinite; pointer-events: none;
      }
      .d1 { animation-delay: 0s; }
      .d2 { animation-delay: 0.8s; }
      @keyframes pulse-up {
        0%   { stroke-dashoffset: 140; opacity: 0; }
        6%   { opacity: 1; }
        80%  { stroke-dashoffset: -20; opacity: 1; }
        92%  { opacity: 0; }
        100% { stroke-dashoffset: 140; opacity: 0; }
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="500" fill="#1E3A5F">Project David — Core to Platform Pipeline</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#555555">From research codebase to sovereign air-gapped AI deployment</text>

  <!-- ── TOP ROW BOXES (y=65, h=152, bottom=217) ── -->

  <!-- Core -->
  <rect x="20" y="65" width="225" height="152" rx="10" fill="#F2F4F7" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="132" y="86"  text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid-core</text>
  <text x="132" y="103" text-anchor="middle" font-size="10" fill="#555555">Runtime API engine</text>
  <text x="132" y="118" text-anchor="middle" font-size="10" fill="#555555">AI orchestration · training</text>
  <line x1="32" y1="130" x2="233" y2="130" stroke="#C8C6BE" stroke-width="0.5"/>
  <text x="132" y="143" text-anchor="middle" font-size="8" fill="#666666">entities_api</text>
  <text x="132" y="157" text-anchor="middle" font-size="8" fill="#666666">sandbox</text>
  <text x="132" y="171" text-anchor="middle" font-size="8" fill="#666666">training_api</text>
  <text x="132" y="181" text-anchor="middle" font-size="8" fill="#666666">training_worker</text>
  <text x="132" y="207" text-anchor="middle" font-size="9" fill="#888780">[...14 more]</text>

  <!-- Arrow Core→Docker -->
  <line x1="245" y1="141" x2="257" y2="141" stroke="#2E75B6" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="251" y="131" text-anchor="middle" font-size="9" fill="#888780">builds</text>

  <!-- Docker Images -->
  <rect x="259" y="65" width="213" height="152" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.75"/>
  <text x="365" y="86"  text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">Docker Images</text>
  <text x="365" y="103" text-anchor="middle" font-size="10" fill="#555555">core-api · core-sandbox  :latest</text>
  <text x="365" y="118" text-anchor="middle" font-size="10" fill="#555555">core-training-api  :latest</text>
  <text x="365" y="128" text-anchor="middle" font-size="10" fill="#555555">core-training-worker  :latest</text>
  <line x1="271" y1="130" x2="460" y2="130" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="365" y="207" text-anchor="middle" font-size="9" fill="#185FA5">Docker Hub — thanosprime</text>

  <!-- Arrow Docker→Platform -->
  <line x1="472" y1="141" x2="484" y2="141" stroke="#2E75B6" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="478" y="131" text-anchor="middle" font-size="9" fill="#888780">pulled by</text>

  <!-- Platform -->
  <rect x="486" y="65" width="163" height="152" rx="10" fill="#EDE0F5" stroke="#534AB7" stroke-width="1"/>
  <text x="567" y="86"  text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid-platform</text>
  <text x="567" y="103" text-anchor="middle" font-size="10" fill="#555555">pip install</text>
  <text x="567" y="118" text-anchor="middle" font-size="10" fill="#555555">Docker Compose orchestration</text>
  <text x="567" y="134" text-anchor="middle" font-size="10" fill="#555555">pdavid --mode up</text>
  <text x="567" y="196" text-anchor="middle" font-size="8" fill="#888780">no internal deps</text>
  <text x="567" y="209" text-anchor="middle" font-size="8" fill="#888780">distribution only</text>

  <!-- Arrow Platform→Stack -->
  <line x1="649" y1="141" x2="661" y2="141" stroke="#2E75B6" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="655" y="131" text-anchor="middle" font-size="9" fill="#888780">deploys</text>

  <!-- Stack -->
  <rect x="663" y="65" width="215" height="152" rx="10" fill="#D6F0E0" stroke="#1A6B3C" stroke-width="1"/>
  <text x="770" y="86"  text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">Sovereign AI Stack</text>
  <text x="770" y="103" text-anchor="middle" font-size="10" fill="#555555">API · DB · Sandbox · Search</text>
  <text x="770" y="118" text-anchor="middle" font-size="10" fill="#555555">Ollama · vLLM · Ray cluster</text>
  <text x="770" y="152" text-anchor="middle" font-size="10" fill="#1A6B3C">Fully air-gapped at runtime</text>
  <text x="770" y="167" text-anchor="middle" font-size="10" fill="#1A6B3C">No external dependencies</text>

  <!-- ── BOTTOM SECTION ── -->
  <text x="248" y="233" text-anchor="middle" font-size="10" fill="#888780" letter-spacing="0.05em">DIRECT RUNTIME DEPENDENCIES  —  core · docker images</text>

  <!-- SDK box — spans core + docker, centered on their midpoints -->
  <rect x="20" y="241" width="452" height="72" rx="8" fill="#EDE0F5" stroke="#534AB7" stroke-width="0.75"/>
  <text x="246" y="261" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid  (SDK)</text>
  <text x="246" y="275" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid_common  </text>
  <text x="246" y="285" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid_orm  </text>
  <text x="246" y="296" text-anchor="middle" font-size="11" font-weight="500" fill="#1E3A5F">projectdavid_services  </text>






  <!-- Static dashed connectors — arrows into center of core and docker -->
  <line x1="132" y1="241" x2="132" y2="217" stroke="#888780" stroke-width="0.75" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow-gray)"/>
  <line x1="365" y1="241" x2="365" y2="217" stroke="#888780" stroke-width="0.75" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow-gray)"/>

  <!-- Warm yellow pulse animations — traveling up into box centers -->
  <path class="pu-g d1" d="M132,253 L132,217"/>
  <path class="pu-c d1" d="M132,253 L132,217"/>
  <path class="pu-g d2" d="M365,253 L365,217"/>
  <path class="pu-c d2" d="M365,253 L365,217"/>

  <!-- Blue spark traces — top pipeline row -->
  <path class="sk-g" d="M20,141 L20,75 Q20,65 30,65 L235,65 Q245,65 245,75 L245,141 L257,141 L257,75 Q257,65 267,65 L462,65 Q472,65 472,75 L472,141 L484,141 L484,75 Q484,65 494,65 L639,65 Q649,65 649,75 L649,141 L661,141 L661,75 Q661,65 671,65 L868,65 Q878,65 878,75 L878,141"/>
  <path class="sk-c" d="M20,141 L20,75 Q20,65 30,65 L235,65 Q245,65 245,75 L245,141 L257,141 L257,75 Q257,65 267,65 L462,65 Q472,65 472,75 L472,141 L484,141 L484,75 Q484,65 494,65 L639,65 Q649,65 649,75 L649,141 L661,141 L661,75 Q661,65 671,65 L868,65 Q878,65 878,75 L878,141"/>
  <path class="sk-g" d="M20,141 L20,207 Q20,217 30,217 L235,217 Q245,217 245,207 L245,141 L257,141 L257,207 Q257,217 267,217 L462,217 Q472,217 472,207 L472,141 L484,141 L484,207 Q484,217 494,217 L639,217 Q649,217 649,207 L649,141 L661,141 L661,207 Q661,217 671,217 L868,217 Q878,217 878,207 L878,141"/>
  <path class="sk-c" d="M20,141 L20,207 Q20,217 30,217 L235,217 Q245,217 245,207 L245,141 L257,141 L257,207 Q257,217 267,217 L462,217 Q472,217 472,207 L472,141 L484,141 L484,207 Q484,217 494,217 L639,217 Q649,217 649,207 L649,141 L661,141 L661,207 Q661,217 671,217 L868,217 Q878,217 878,207 L878,141"/>
</svg>