<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<title>Sovereign Cluster inference architecture</title>
<desc>Request flow from client through nginx, Rust pd_router, Project David API and mesh resolver, into the Ray Serve cluster where base and fine-tuned model deployments run on GPU, with DeltaNormalizer and SSE framer processing the response stream in Rust before returning to the client.</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  .lm  { font-size: 14px; font-weight: 500; }
  .ls  { font-size: 12px; font-weight: 400; }
  .lxs { font-size: 11px; font-weight: 400; }
</style>

<!-- CLIENT -->
<rect x="200" y="16" width="260" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="330" y="36" text-anchor="middle" dominant-baseline="central" class="lm" fill="#444441">client</text>

<line x1="330" y1="56" x2="330" y2="72" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- NGINX -->
<rect x="200" y="72" width="260" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="330" y="90" text-anchor="middle" dominant-baseline="central" class="lm" fill="#444441">nginx :80</text>
<text x="330" y="111" text-anchor="middle" dominant-baseline="central" class="ls" fill="#5F5E5A">/v1/completions → router</text>

<line x1="330" y1="124" x2="330" y2="140" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- PD_ROUTER — Rust -->
<rect x="200" y="140" width="260" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="330" y="158" text-anchor="middle" dominant-baseline="central" class="lm" fill="#085041">pd_router :9100</text>
<text x="330" y="179" text-anchor="middle" dominant-baseline="central" class="ls" fill="#0F6E56">Rust · connection pool · SSE</text>

<line x1="330" y1="192" x2="330" y2="208" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- PROJECT DAVID API -->
<rect x="200" y="208" width="260" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="330" y="226" text-anchor="middle" dominant-baseline="central" class="lm" fill="#444441">Project David API :9000</text>
<text x="330" y="247" text-anchor="middle" dominant-baseline="central" class="ls" fill="#5F5E5A">routes · templates · streams</text>

<!-- MESH RESOLVER -->
<rect x="490" y="216" width="154" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="567" y="232" text-anchor="middle" dominant-baseline="central" class="lm" fill="#085041">mesh resolver</text>
<text x="567" y="250" text-anchor="middle" dominant-baseline="central" class="lxs" fill="#0F6E56">finds active endpoint</text>

<!-- API to Mesh Resolver arrows -->
<line x1="460" y1="227" x2="490" y2="227" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr-teal)"/>
<line x1="490" y1="243" x2="460" y2="243" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-teal)"/>

<!-- API → cluster -->
<line x1="330" y1="260" x2="330" y2="278" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text x="340" y="272" class="lxs" fill="#888780">POST /vllm_dep_...</text>

<!-- RAY SERVE CLUSTER CONTAINER -->
<rect x="48" y="278" width="584" height="210" rx="16" fill="#E1F5EE" fill-opacity="0.2" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 4"/>
<text x="330" y="297" text-anchor="middle" class="ls" font-weight="500" fill="#0F6E56">Ray Serve cluster · inference worker</text>

<!-- BASE MODEL -->
<rect x="64" y="308" width="224" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="176" y="326" text-anchor="middle" dominant-baseline="central" class="lm" fill="#3C3489">base model</text>
<text x="176" y="347" text-anchor="middle" dominant-baseline="central" class="ls" fill="#534AB7">any HF open-weight model</text>

<!-- FINE-TUNED MODEL -->
<rect x="392" y="308" width="224" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="504" y="326" text-anchor="middle" dominant-baseline="central" class="lm" fill="#3C3489">fine-tuned model</text>
<text x="504" y="347" text-anchor="middle" dominant-baseline="central" class="ls" fill="#534AB7">LoRA adapter + base weights</text>

<!-- Merge lines to GPU -->
<polyline points="176,360 176,376 330,376" fill="none" stroke="#888780" stroke-width="1"/>
<polyline points="504,360 504,376 330,376" fill="none" stroke="#888780" stroke-width="1"/>
<line x1="330" y1="376" x2="330" y2="390" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- GPU / vLLM -->
<rect x="190" y="390" width="280" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="330" y="406" text-anchor="middle" dominant-baseline="central" class="lm" fill="#633806">vLLM · GPU</text>
<text x="330" y="424" text-anchor="middle" dominant-baseline="central" class="ls" fill="#854F0B">AsyncLLMEngine · inference</text>

<!-- GPU → DeltaNorm (teal arrow — response path) -->
<line x1="330" y1="434" x2="330" y2="450" stroke="#0F6E56" stroke-width="1" marker-end="url(#arr-teal)"/>

<!-- DELTANORMALIZER + SSE FRAMER — Rust -->
<rect x="190" y="450" width="280" height="30" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="330" y="465" text-anchor="middle" dominant-baseline="central" class="ls" font-weight="500" fill="#085041">DeltaNormalizer · SSE framer · Rust</text>

<!-- LEGEND -->
<rect x="72" y="504" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="88" y="513" class="lxs" fill="#5F5E5A">Rust</text>

<rect x="136" y="504" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="152" y="513" class="lxs" fill="#5F5E5A">Python / nginx</text>

<rect x="248" y="504" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="264" y="513" class="lxs" fill="#5F5E5A">Ray Serve</text>

<rect x="338" y="504" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="354" y="513" class="lxs" fill="#5F5E5A">GPU inference</text>

</svg>