<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Georgia, serif; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text { fill: #2C2C2A; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text { fill: #085041; }
    .c-gray-pill rect { fill: #D3D1C7; stroke: #5F5E5A; }
    a { cursor: pointer; }
    a:hover rect { opacity: 0.8; }
  </style>
</defs>

<!-- 1. create_assistant -->
<a href="/docs/sdk-assistants">
  <g class="c-gray">
    <rect x="230" y="44" width="220" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="66" text-anchor="middle" dominant-baseline="central">create_assistant()</text>
  </g>
</a>

<line x1="340" y1="88" x2="340" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

