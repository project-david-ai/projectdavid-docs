<!-- Header -->
<text class="title" x="340" y="36" text-anchor="middle">Activation pipeline</text>
<text class="subtitle" x="340" text-anchor="middle">
  <tspan x="340" y="58">Deploy a locally hosted model to the inference cluster and make it ready to serve requests.</tspan>
  <tspan x="340" dy="18">Click any step to jump to its documentation.</tspan>
</text>

<text class="tb" x="340" y="104" text-anchor="middle">Activation applies only to vLLM-hosted models. Cloud provider models are always available</text>
<text class="tb" x="340" y="120" text-anchor="middle">and do not require this step. All activation calls require an admin-scoped API key.</text>

<!-- Divider -->
<line x1="90" y1="136" x2="590" y2="136" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- 1. registry.register -->
<a href="/docs/admin-model-activation#step-1--registration">
  <g class="c-amber">
    <rect x="230" y="150" width="220" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="172" text-anchor="middle" dominant-baseline="central">registry.register()</text>
  </g>
</a>

<!-- Catalog boundary -->
<line x1="340" y1="194" x2="340" y2="206" stroke="#888780" stroke-width="1.5"/>
<line x1="90" y1="214" x2="590" y2="214" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="340" y="214" text-anchor="middle" dominant-baseline="central" opacity="0.5">catalog</text>
<line x1="340" y1="222" x2="340" y2="242" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

