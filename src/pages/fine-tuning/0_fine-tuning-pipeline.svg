<!-- Header -->
<text class="title" x="340" y="36" text-anchor="middle">Training pipeline</text>
<text class="subtitle" x="340" text-anchor="middle">
  <tspan x="340" dy="0" y="58">The complete fine-tuning lifecycle, from dataset upload to adapter registration.</tspan>
  <tspan x="340" dy="18">Click any step to jump to its documentation.</tspan>
</text>

<!-- Use case intro -->
<text class="tb" x="340" y="104" text-anchor="middle">Use fine-tuning when a general-purpose model needs to internalise domain-specific</text>
<text class="tb" x="340" y="120" text-anchor="middle">terminology, response style, or restricted knowledge that cannot be injected via prompt.</text>
<text class="tb" x="340" y="136" text-anchor="middle">All training runs entirely on your infrastructure — no data leaves the deployment boundary.</text>

